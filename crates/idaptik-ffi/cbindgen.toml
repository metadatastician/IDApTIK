# cbindgen configuration for the idaptik-ffi C header.
# Regenerate with `just ffi-header` (or `cbindgen --output include/idaptik.h`
# from this directory).

language = "C"
include_guard = "IDAPTIK_H"
cpp_compat = true
documentation = true
autogen_warning = "/* Auto-generated by cbindgen — do not edit by hand. Regenerate with `just ffi-header`. */"

[parse]
parse_deps = false

[export]
# The handles are opaque: consumers only ever hold pointers to them.
exclude = []
