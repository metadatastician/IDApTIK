# SonarQube Cloud (SonarCloud) configuration.
# Project: https://sonarcloud.io/project/overview?id=metadatastician_IDApTIK
# Requires the SONAR_TOKEN repository secret + a SonarCloud project (owner setup).
#
# ORG IS ASSUMED, NOT VERIFIED -- maintainer to confirm before provisioning.
# Reasoning: IDApTIK is a metadatastician-org GitHub repo, and cadastra (also
# metadatastician-org) carries a metadatastician_cadastra README badge. But the
# "metadatastician" SonarCloud org has no projects, while "hyperpolymath" has
# 618 and is what every other sonar-project.properties in the estate uses. If
# the estate in fact consolidates under the hyperpolymath SonarCloud org, this
# should read hyperpolymath / hyperpolymath_IDApTIK instead.
# Separately: several template-derived repos still carry a stale
# hyperpolymath_rsr-template-repo key from copy-paste; do not follow those.
sonar.organization=metadatastician
sonar.projectKey=metadatastician_IDApTIK

# Elixir and Nickel have no SonarCloud analyser; build artefacts, vendored
# deps and lockfiles are excluded to keep findings signal-rich (mirrors the
# cadastra/boj-server arrangement).
sonar.exclusions=**/target/**,server/_build/**,server/deps/**,server/cover/**,server/doc/**,Cargo.lock,fixtures/**
sonar.coverage.exclusions=**/tests/**,**/*test*
