# Rust toolchain pin for IDApTIK.
#
# Rust is managed by rustup (not mise) so that cargo subcommands and the
# rust-analyzer/clippy components resolve the same way in editors, CI, and
# Claude Code web sessions. See docs/adr/0001-toolchain-and-runtime-management.md.
#
# 1.95.0 is the minimum supported Rust version for Bevy 0.19; pinning it exactly
# keeps builds reproducible across machines. Bump deliberately, not automatically.
[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy", "rust-src", "rust-analyzer"]
# wasm32 target kept ready: both Bevy and Fyrox ship WebAssembly backends, and a
# browser build is a plausible distribution target for an infiltration game.
targets = ["wasm32-unknown-unknown"]
